<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
        }

        img {
            width: 220px;
            height: 150px;
            border: 3px solid #0077cc;
            border-radius: 8px;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <table>

        <caption>Local Community Event Gallery</caption>

        <tr>
            <td>
                <img src="https://via.placeholder.com/220x150?text=Tech+Meetup"
                     alt="Tech Meetup"
                     title="Tech Meetup">
            </td>

            <td>
                <img src="https://via.placeholder.com/220x150?text=Music+Festival"
                     alt="Music Festival"
                     title="Music Festival">
            </td>

            <td>
                <img src="https://via.placeholder.com/220x150?text=Food+Fair"
                     alt="Food Fair"
                     title="Food Fair">
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://via.placeholder.com/220x150?text=Art+Expo"
                     alt="Art Expo"
                     title="Art Expo">
            </td>

            <td>
                <img src="https://via.placeholder.com/220x150?text=Workshop"
                     alt="Workshop"
                     title="Workshop">
            </td>

            <td>
                <img src="https://via.placeholder.com/220x150?text=Sports+Day"
                     alt="Sports Day"
                     title="Sports Day">
            </td>
        </tr>

    </table>

</body>

</html>
