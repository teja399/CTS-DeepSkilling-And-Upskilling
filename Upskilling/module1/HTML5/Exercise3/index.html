<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <!-- Internal CSS -->
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 2px 5px;
        }
    </style>
</head>

<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">
        <h1>Welcome to the Local Community Event Portal</h1>

        <p>
            We are happy to have you here!
        </p>

        <span style="color:red; font-weight:bold;">
            Special Offer: Register today and get free event notifications!
        </span>
    </div>

    <br>

    <p class="highlight">
        Upcoming Technology Workshop
    </p>

    <p class="highlight">
        Community Awareness Program
    </p>

</body>

</html>
